name: Publish results browser

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [results_updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted site code from main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: source

      - name: Check out committed live results as data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: results-live
          path: results-live

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Test generator
        working-directory: source
        run: python3 -m unittest discover -s tests -p 'test_sitegen.py' -v

      - name: Build static browser
        working-directory: source
        run: >-
          python3 -m sitegen build
          --data-root ../results-live
          --output _site
          --base-path "${{ steps.pages.outputs.base_path }}"

      - name: Validate static browser
        working-directory: source
        run: python3 -m sitegen validate --site _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: source/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
