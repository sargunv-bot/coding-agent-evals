name: Publish results browser

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [results_updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted site code from main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: source

      - name: Check out committed live results as data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: results-live
          path: results-live

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/web/package-lock.json

      - name: Install trusted web dependencies
        working-directory: source/web
        run: npm ci --ignore-scripts

      - name: Check and test trusted web source
        working-directory: source/web
        run: npm run lint && npm run check && npm test

      - name: Build static browser from committed live data
        working-directory: source/web
        env:
          RESULTS_DATA_ROOT: ../../results-live
          TASK_DATA_ROOT: ..
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Validate static browser
        working-directory: source/web
        run: npm run validate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: source/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
