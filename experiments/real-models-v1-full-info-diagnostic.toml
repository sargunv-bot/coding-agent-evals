[experiment]
id = "real-models-v1-full-info-diagnostic"
description = "Four-cell diagnostic for ambiguity-floor validation before breadth evaluation"
stage = "full-info-diagnostic"
repeats = 1
concurrency = 1
infrastructure_retries = 1
proctor_model = "openai/gpt-5.6-sol"

[[models]]
provider = "zai"
model = "glm-5.2"

[[models]]
provider = "opencode-go"
model = "deepseek-v4-pro"

[[cells]]
task = "ce-01-antidote-output"
mode = "full_info"
initial_clarification = "Apply output-channel isolation consistently to both clone and update Git subprocesses. Preserve all diagnostics by routing subprocess stdout to stderr rather than discarding it."

[[cells]]
task = "ce-07-mobility-result"
scenario = "all-errors-as-result"
mode = "full_info"
